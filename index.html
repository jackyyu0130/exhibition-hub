<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣展覽誌｜全台藝文活動每日自動更新</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6F3EC;
    --paper-raised: #FFFFFF;
    --ink: #1C1A17;
    --ink-soft: #5B564C;
    --stamp: #A5342E;
    --teal: #285C56;
    --line: #DCD5C4;
    --gold: #A9822F;
    --sidebar-w: 240px;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; }

  header{
    padding: 4rem 1.5rem 2.75rem;
    text-align:center;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  header::before{
    content: "";
    position:absolute;
    top:0; left:0; right:0;
    height: 6px;
    background: repeating-linear-gradient(
      90deg, var(--stamp) 0 18px, transparent 18px 30px
    );
    opacity: .55;
  }

  .eyebrow{
    font-family: "JetBrains Mono", monospace;
    font-size: .75rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--stamp);
    margin-bottom: 1rem;
  }

  h1{
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    margin: 0 0 .75rem;
    letter-spacing: .02em;
  }

  .subtitle{
    color: var(--ink-soft);
    font-size: 1rem;
    max-width: 34rem;
    margin: 0 auto 1.5rem;
    line-height: 1.7;
  }

  .stat-line{
    font-family: "JetBrains Mono", monospace;
    font-size: .95rem;
    color: var(--teal);
  }

  .stat-line b{
    font-size: 1.3rem;
    color: var(--stamp);
  }

  .search-bar{
    max-width: 1120px;
    margin: -1.4rem auto 0;
    padding: 0 1.5rem;
    position: relative;
    z-index: 3;
    display:flex;
    justify-content:center;
  }

  .search-bar-inner{
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: .9rem 1.1rem;
    display:flex;
    align-items:center;
    gap: .7rem;
    box-shadow: 0 8px 24px rgba(28,26,23,.06);
    width: 100%;
    max-width: 640px;
  }

  input[type="text"], select{
    font-family: "Noto Sans TC", sans-serif;
    font-size: .95rem;
    padding: .5rem .7rem;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink);
  }

  #searchInput{ flex:1; border:none; background:transparent; padding: .3rem; }
  #searchInput:focus{ outline:none; }

  #filterToggle{
    display:none;
    font-family: "JetBrains Mono", monospace;
    font-size: .8rem;
    letter-spacing: .05em;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    padding: .55rem .9rem;
    cursor:pointer;
    white-space: nowrap;
  }

  .layout{
    max-width: 1120px;
    margin: 0 auto;
    padding: 2.25rem 1.5rem 5rem;
    display:grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    gap: 2rem;
    align-items:start;
  }

  aside.sidebar{
    position: sticky;
    top: 1.25rem;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.3rem 1.2rem;
  }

  .filter-group{ margin-bottom: 1.6rem; }
  .filter-group:last-child{ margin-bottom: 0; }

  .filter-title{
    font-family: "JetBrains Mono", monospace;
    font-size: .72rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: .7rem;
    display:flex;
    justify-content: space-between;
    align-items:center;
  }

  .filter-title button{
    font-family: inherit;
    font-size: .68rem;
    background: none;
    border: none;
    color: var(--teal);
    cursor:pointer;
    text-decoration: underline;
    padding:0;
  }

  .filter-option{
    display:flex;
    align-items:center;
    gap: .5rem;
    font-size: .87rem;
    padding: .32rem 0;
    cursor:pointer;
    color: var(--ink);
  }

  .filter-option input{
    accent-color: var(--stamp);
    width: 15px; height: 15px;
    flex-shrink:0;
  }

  .filter-option .count{
    margin-left:auto;
    font-family: "JetBrains Mono", monospace;
    font-size: .72rem;
    color: var(--ink-soft);
  }

  .toggle-row{
    display:flex;
    align-items:center;
    gap: .5rem;
    font-size: .87rem;
    color: var(--ink-soft);
  }

  .entry{
    display:grid;
    grid-template-columns: 108px 1px 1fr;
    gap: 0;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-bottom: 1.1rem;
    overflow: hidden;
    text-decoration:none;
    color: inherit;
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }

  a.entry:hover, a.entry:focus-visible{
    transform: translateY(-2px);
    box-shadow: 0 10px 26px rgba(28,26,23,.09);
    border-color: var(--stamp);
  }

  .stub{
    font-family: "JetBrains Mono", monospace;
    padding: 1.2rem .6rem;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap: .35rem;
  }

  .stub .month{ font-size: .7rem; letter-spacing:.1em; color: var(--ink-soft); }
  .stub .day{ font-size: 1.6rem; font-weight: 700; line-height:1; }
  .stub .to{ font-size: .68rem; color: var(--ink-soft); margin-top:.2rem; }

  .perforation{
    position: relative;
    background: repeating-linear-gradient(
      var(--line), var(--line) 6px, transparent 6px 12px
    );
    width: 1px;
  }
  .perforation::before, .perforation::after{
    content:"";
    position:absolute;
    left:50%; transform:translateX(-50%);
    width:14px; height:14px;
    background: var(--paper);
    border-radius:50%;
  }
  .perforation::before{ top:-7px; }
  .perforation::after{ bottom:-7px; }

  .content{ padding: 1.2rem 1.4rem; }

  .tag-row{ display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom: .55rem; }

  .tag{
    display:inline-block;
    font-family: "JetBrains Mono", monospace;
    font-size: .68rem;
    letter-spacing: .1em;
    color: var(--stamp);
    border: 1px solid var(--stamp);
    border-radius: 2px;
    padding: .1rem .45rem;
    transform: rotate(-1deg);
  }

  .tag.region{ color: var(--teal); border-color: var(--teal); transform: rotate(1deg); }

  .entry h3{
    font-family: "Noto Serif TC", serif;
    font-size: 1.2rem;
    margin: 0 0 .4rem;
    line-height: 1.4;
  }

  .meta{
    font-size: .82rem;
    color: var(--ink-soft);
    margin-bottom: .5rem;
  }

  .meta .sep{ margin: 0 .4rem; opacity:.5; }

  .desc{
    font-size: .88rem;
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 0 0 .3rem;
  }

  .more-hint{
    font-size: .78rem;
    color: var(--teal);
  }

  .empty{
    text-align:center;
    padding: 4rem 1rem;
    color: var(--ink-soft);
    font-family: "Noto Serif TC", serif;
    font-size: 1.1rem;
    grid-column: 1 / -1;
  }

  footer{
    text-align:center;
    padding: 2rem 1.5rem 3rem;
    font-size: .78rem;
    color: var(--ink-soft);
    font-family: "JetBrains Mono", monospace;
  }

  :focus-visible{ outline: 2px solid var(--teal); outline-offset: 2px; }

  @media (max-width: 860px){
    .layout{ grid-template-columns: 1fr; }

    #filterToggle{ display:inline-block; }

    aside.sidebar{
      position: fixed;
      top:0; right:0; bottom:0;
      width: min(84vw, 320px);
      border-radius: 0;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .22s ease;
      z-index: 20;
      box-shadow: -12px 0 30px rgba(0,0,0,.15);
    }

    aside.sidebar.open{ transform: translateX(0); }

    .sidebar-overlay{
      display:none;
      position: fixed; inset:0;
      background: rgba(28,26,23,.35);
      z-index: 15;
    }

    .sidebar-overlay.open{ display:block; }

    .sidebar-close{
      display:block;
      margin-bottom: 1rem;
      background:none;
      border:1px solid var(--line);
      border-radius:3px;
      padding:.4rem .7rem;
      font-family:"JetBrains Mono", monospace;
      font-size:.75rem;
      cursor:pointer;
    }
  }

  @media (min-width: 861px){
    .sidebar-close, .sidebar-overlay{ display:none; }
  }

  @media (max-width: 520px){
    .entry{ grid-template-columns: 78px 1px 1fr; }
    .stub{ padding: 1rem .3rem; }
    .stub .day{ font-size: 1.3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">TAIWAN EXHIBITION LOG · 自動蒐集整合</div>
  <h1>台灣展覽誌</h1>
  <p class="subtitle">彙整文化部開放資料與各大展演場館資訊，每日自動更新全台展覽與藝文活動。</p>
  <p class="stat-line" id="statLine">載入中…</p>
</header>

<div class="search-bar">
  <div class="search-bar-inner">
    <input type="text" id="searchInput" placeholder="搜尋展覽名稱、地點、主辦單位…">
    <button id="filterToggle" type="button">篩選 ▾</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebarClose" type="button">✕ 關閉篩選</button>

    <div class="filter-group">
      <div class="filter-title">
        <span>地區</span>
        <button type="button" data-clear="region">清除</button>
      </div>
      <div id="regionOptions"></div>
    </div>

    <div class="filter-group">
      <div class="filter-title">
        <span>類別</span>
        <button type="button" data-clear="category">清除</button>
      </div>
      <div id="categoryOptions"></div>
    </div>

    <div class="filter-group">
      <div class="filter-title"><span>顯示</span></div>
      <label class="toggle-row">
        <input type="checkbox" id="ongoingOnly">
        只看目前展出中
      </label>
    </div>
  </aside>

  <main id="list">
    <div class="empty">載入資料中…</div>
  </main>
</div>

<footer>
  資料來源：文化部文化資料開放服務網（cloud.culture.tw）、華山1914文化創意產業園區 · 每日自動更新
</footer>

<script>
const state = {
  events: [],
  updatedAt: null,
  selectedRegions: new Set(),
  selectedCategories: new Set(),
};

const REGION_GROUPS = [
  ['台北市','臺北市'], ['新北市'], ['基隆市'], ['桃園市'],
  ['新竹市'], ['新竹縣'], ['苗栗縣'], ['台中市','臺中市'],
  ['彰化縣'], ['南投縣'], ['雲林縣'], ['嘉義市'], ['嘉義縣'],
  ['台南市','臺南市'], ['高雄市'], ['屏東縣'], ['宜蘭縣'],
  ['花蓮縣'], ['台東縣','臺東縣'], ['澎湖縣'], ['金門縣'], ['連江縣'],
];

function detectRegion(ev){
  const text = `${ev.locationName || ''} ${ev.location || ''}`;
  for(const group of REGION_GROUPS){
    if(group.some(kw => text.includes(kw))) return group[0];
  }
  return '其他地區';
}

async function loadData(){
  try{
    const res = await fetch('data/exhibitions.json', { cache: 'no-store' });
    const data = await res.json();
    state.events = (data.events || []).map(ev => ({ ...ev, region: detectRegion(ev) }));
    state.updatedAt = data.updatedAt;
    buildFilterOptions();
    render();
    updateStatLine();
  }catch(err){
    document.getElementById('list').innerHTML =
      '<div class="empty">資料載入失敗，請確認 data/exhibitions.json 是否存在。</div>';
    console.error(err);
  }
}

function updateStatLine(){
  const el = document.getElementById('statLine');
  const time = state.updatedAt ? new Date(state.updatedAt) : null;
  const timeStr = time ? time.toLocaleString('zh-TW', { hour12:false }) : '尚未更新';
  el.innerHTML = `目前收錄 <b>${state.events.length}</b> 檔活動 · 最後更新：${timeStr}`;
}

function countBy(key){
  const counts = {};
  state.events.forEach(ev => {
    const v = ev[key];
    if(!v) return;
    counts[v] = (counts[v] || 0) + 1;
  });
  return counts;
}

function buildFilterOptions(){
  const regionCounts = countBy('region');
  const categoryCounts = countBy('category');

  const regionEl = document.getElementById('regionOptions');
  regionEl.innerHTML = Object.keys(regionCounts).sort((a,b)=>regionCounts[b]-regionCounts[a]).map(region => `
    <label class="filter-option">
      <input type="checkbox" data-type="region" value="${escapeAttr(region)}">
      ${escapeHtml(region)}
      <span class="count">${regionCounts[region]}</span>
    </label>
  `).join('');

  const categoryEl = document.getElementById('categoryOptions');
  categoryEl.innerHTML = Object.keys(categoryCounts).sort((a,b)=>categoryCounts[b]-categoryCounts[a]).map(cat => `
    <label class="filter-option">
      <input type="checkbox" data-type="category" value="${escapeAttr(cat)}">
      ${escapeHtml(cat)}
      <span class="count">${categoryCounts[cat]}</span>
    </label>
  `).join('');

  document.querySelectorAll('input[data-type="region"]').forEach(cb => {
    cb.addEventListener('change', () => {
      toggleSetValue(state.selectedRegions, cb.value, cb.checked);
      render();
    });
  });
  document.querySelectorAll('input[data-type="category"]').forEach(cb => {
    cb.addEventListener('change', () => {
      toggleSetValue(state.selectedCategories, cb.value, cb.checked);
      render();
    });
  });
}

function toggleSetValue(set, value, on){
  if(on) set.add(value); else set.delete(value);
}

function parseDate(str){
  if(!str) return null;
  const parts = str.split(/[\/\-]/).map(Number);
  if(parts.length < 3) return null;
  return new Date(parts[0], parts[1]-1, parts[2]);
}

function isOngoing(ev){
  const now = new Date();
  const start = parseDate(ev.startDate);
  const end = parseDate(ev.endDate);
  if(start && start > now) return false;
  if(end && end < now) return false;
  return true;
}

function stubMarkup(ev){
  const start = parseDate(ev.startDate);
  if(!start){
    return `<div class="month">TBD</div><div class="day">－</div>`;
  }
  const month = String(start.getMonth()+1).padStart(2,'0');
  const day = String(start.getDate()).padStart(2,'0');
  const hasEnd = ev.endDate && ev.endDate !== ev.startDate;
  return `
    <div class="month">${month} 月</div>
    <div class="day">${day}</div>
    ${hasEnd ? `<div class="to">→ ${ev.endDate}</div>` : ''}
  `;
}

function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const ongoingOnly = document.getElementById('ongoingOnly').checked;

  let filtered = state.events.filter(ev => {
    if(state.selectedRegions.size && !state.selectedRegions.has(ev.region)) return false;
    if(state.selectedCategories.size && !state.selectedCategories.has(ev.category)) return false;
    if(ongoingOnly && !isOngoing(ev)) return false;
    if(q){
      const haystack = `${ev.title} ${ev.locationName} ${ev.location} ${ev.unit}`.toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });

  const list = document.getElementById('list');
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty">沒有符合條件的活動，換個關鍵字或篩選條件看看？</div>';
    return;
  }

  list.innerHTML = filtered.map(ev => {
    const tag = ev.sourceUrl ? 'a' : 'div';
    const href = ev.sourceUrl ? `href="${escapeAttr(ev.sourceUrl)}" target="_blank" rel="noopener"` : '';
    return `
    <${tag} class="entry" ${href}>
      <div class="stub">${stubMarkup(ev)}</div>
      <div class="perforation"></div>
      <div class="content">
        <div class="tag-row">
          <span class="tag">${escapeHtml(ev.category || '活動')}</span>
          <span class="tag region">${escapeHtml(ev.region || '其他地區')}</span>
        </div>
        <h3>${escapeHtml(ev.title)}</h3>
        <div class="meta">
          ${escapeHtml(ev.locationName || ev.location || '地點未提供')}
          ${ev.unit ? `<span class="sep">·</span>${escapeHtml(ev.unit)}` : ''}
        </div>
        ${ev.description ? `<p class="desc">${escapeHtml(ev.description)}</p>` : ''}
        ${ev.sourceUrl ? `<span class="more-hint">點擊查看官方活動頁面 →</span>` : ''}
      </div>
    </${tag}>
  `;
  }).join('');
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

function escapeAttr(str){ return escapeHtml(str); }

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('ongoingOnly').addEventListener('change', render);

document.querySelectorAll('button[data-clear]').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.clear;
    const set = type === 'region' ? state.selectedRegions : state.selectedCategories;
    set.clear();
    document.querySelectorAll(`input[data-type="${type}"]`).forEach(cb => cb.checked = false);
    render();
  });
});

const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('open'); }
function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); }
document.getElementById('filterToggle').addEventListener('click', openSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

loadData();
</script>

</body>
</html>
