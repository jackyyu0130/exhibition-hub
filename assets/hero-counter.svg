<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="簡約票務櫃台插畫">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3efe7"/>
      <stop offset="1" stop-color="#dfd7ca"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f4a35"/>
      <stop offset="1" stop-color="#3e291f"/>
    </linearGradient>
    <linearGradient id="slot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#191714"/>
      <stop offset=".5" stop-color="#44372e"/>
      <stop offset="1" stop-color="#171512"/>
    </linearGradient>
    <radialGradient id="light" cx="22%" cy="10%" r="80%">
      <stop offset="0" stop-color="#fff" stop-opacity=".92"/>
      <stop offset=".62" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grain" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M0 10 C10 4 22 17 38 10" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="1"/>
      <path d="M0 28 C13 21 25 34 38 27" fill="none" stroke="#000" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#wall)"/>
  <rect width="1200" height="900" fill="url(#light)"/>
  <g opacity=".12" filter="url(#soft)">
    <ellipse cx="155" cy="245" rx="120" ry="260" fill="#6f7c69"/>
    <ellipse cx="265" cy="160" rx="75" ry="180" fill="#77836e"/>
    <ellipse cx="70" cy="520" rx="100" ry="210" fill="#66725f"/>
  </g>
  <rect x="0" y="690" width="1200" height="210" fill="url(#counter)"/>
  <rect x="0" y="690" width="1200" height="210" fill="url(#grain)"/>
  <rect x="0" y="678" width="1200" height="18" fill="#2d211a" opacity=".9"/>
  <g transform="translate(890 120)">
    <rect x="0" y="0" width="250" height="470" rx="36" fill="#c9b89d"/>
    <rect x="24" y="24" width="202" height="422" rx="27" fill="#e9e1d4"/>
    <rect x="45" y="182" width="180" height="46" rx="23" fill="url(#slot)"/>
    <rect x="70" y="198" width="120" height="6" rx="3" fill="#0a0908"/>
    <circle cx="125" cy="95" r="42" fill="#b98b55" opacity=".82"/>
    <path d="M125 72v46M102 95h46" stroke="#fff9ef" stroke-width="8" stroke-linecap="round"/>
    <text x="125" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" letter-spacing="6" fill="#776b5d">TICKETS</text>
    <text x="125" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" letter-spacing="3" fill="#9a8c7c">EXHIBITION JOURNAL</text>
  </g>
  <g opacity=".45">
    <path d="M480 205h210" stroke="#c0b7aa" stroke-width="2"/>
    <path d="M510 225h150" stroke="#c0b7aa" stroke-width="2"/>
    <circle cx="584" cy="135" r="5" fill="#b46f45"/>
  </g>
