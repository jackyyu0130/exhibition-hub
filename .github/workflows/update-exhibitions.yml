name: Update data and deploy site

on:
  workflow_dispatch:
  schedule:
    - cron: "25 21 * * *" # 每天台灣時間 05:25
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and normalize exhibition data
        run: python scripts/scraper.py

      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain -- data/exhibitions.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/exhibitions.json
            git commit -m "chore: update exhibition data"
            git push
          else
            echo "No data changes"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
